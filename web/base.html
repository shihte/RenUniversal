<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RenUniversal Agent Platform{% endblock %}</title>
    <script src="/tailwind.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --surface: rgba(30, 41, 59, 0.5);
            --surface-accent: #334155;
            --text-light: #f8fafc;
            --text-muted: #cbd5e1;
            --text-dim: #94a3b8;
            --accent-orange: #60a5fa;
            --accent-blue: #3b82f6;
            --accent-green: #34d399;
            --border-subtle: rgba(51, 65, 85, 0.5);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            -webkit-font-smoothing: antialiased;
        }

        .glass-panel {
            background-color: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .glass-panel:hover {
            border-color: rgba(176, 174, 165, 0.3);
        }

        /* Custom Slider Styling */
        input[type=range] {
            width: 100%;
            height: 4px;
            background-color: var(--surface-accent);
            border-radius: 2px;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background-color: var(--accent-orange);
            -webkit-appearance: none;
            cursor: pointer;
            border: 2px solid var(--text-light);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s ease;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--surface-accent); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
        
        {% block extra_head %}{% endblock %}
    </style>
</head>

<body class="bg-slate-900 text-white min-h-screen flex flex-col md:flex-row overflow-hidden font-sans">
    
    <!-- Sidebar -->
    <aside class="w-full md:w-64 glass-panel border-r border-slate-700/50 flex flex-col md:h-screen shadow-2xl relative z-10 transition-all duration-300">
        <div class="p-6">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent mb-1">RenUniversal</h1>
            <p class="text-xs text-slate-400 font-medium tracking-wide">AGENT PLATFORM</p>
        </div>
        
        <nav class="flex-1 px-4 pb-4 space-y-2 overflow-y-auto">
            <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if active_page == 'monitor' %}bg-blue-500/10 text-blue-400 shadow-inner border border-blue-500/20{% else %}text-slate-300 hover:text-white hover:bg-slate-800/50{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                監控戰情室 (Monitor)
            </a>
            <a href="/camera" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if active_page == 'camera' %}bg-blue-500/10 text-blue-400 shadow-inner border border-blue-500/20{% else %}text-slate-300 hover:text-white hover:bg-slate-800/50{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                鏡頭與校準 (Camera)
            </a>
            <a href="/skills" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if active_page == 'skills' %}bg-blue-500/10 text-blue-400 shadow-inner border border-blue-500/20{% else %}text-slate-300 hover:text-white hover:bg-slate-800/50{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                技能中心 (Skills)
            </a>
            <a href="/events" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if active_page == 'events' %}bg-blue-500/10 text-blue-400 shadow-inner border border-blue-500/20{% else %}text-slate-300 hover:text-white hover:bg-slate-800/50{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                事件處理 (Events)
            </a>
            <a href="/apps" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if active_page == 'apps' %}bg-blue-500/10 text-blue-400 shadow-inner border border-blue-500/20{% else %}text-slate-300 hover:text-white hover:bg-slate-800/50{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                應用程式 (Apps)
            </a>
        </nav>
        
        <!-- Status Indicator in Sidebar Footer -->
        <div class="p-4 border-t border-slate-700/50">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div id="conn-indicator-sidebar" class="w-3 h-3 rounded-full bg-slate-500"></div>
                    <div id="conn-ping-sidebar" class="absolute top-0 left-0 w-3 h-3 rounded-full bg-emerald-500 animate-ping hidden"></div>
                </div>
                <div class="text-xs font-mono text-slate-400">
                    <span id="conn-status-text">OFFLINE</span><br>
                    <span id="conn-fps-sidebar" class="text-[10px] text-slate-500">0 FPS</span>
                </div>
            </div>
        </div>
    </aside>

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
